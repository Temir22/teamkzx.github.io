<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time Tracking Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <main class="dashboard">
    <section class="profile-card">
      <div class="profile-header">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop" alt="User avatar" class="avatar">
        <div class="profile-info">
          <span>Report for</span>
          <h1>Jeremy Robson</h1>
        </div>
      </div>
      <div class="timeframe-selector">
        <button class="time-btn active" data-period="daily">Daily</button>
        <button class="time-btn" data-period="weekly">Weekly</button>
        <button class="time-btn" data-period="monthly">Monthly</button>
      </div>
    </section>

    <div class="cards-container" id="cards"></div>
  </main>

  
  <script src="script.js"></script>
</body>
</html>
