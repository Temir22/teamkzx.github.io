<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Котики Мемы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        .meme {
            margin: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: white;
            padding: 10px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Мемы с Котиками</h1>

    <div class="meme">
        <img src="https://pin.it/7BGazms89" alt="Котик 1">
        <p>Когда ты не хочешь вставать с дивана...</p>
    </div>

    <div class="meme">
        <img src="https://pin.it/2RV5xt2Ua" alt="Котик 2">
        <p>Я просто посмотрю на твою еду!</p>
    </div>

    <div class="meme">
        <img src="https://pin.it/3upirCXOq" alt="Котик 3">
        <p>Всё будет хорошо, если есть котики!</p>
    </div>
    
</body>
</html>
